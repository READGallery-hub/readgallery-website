<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>讀畫樓助手</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #1a2a4a 0%, #0f1d3e 50%, #14294d 100%);
            color: #e8ecf4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        /* Password screen */
        #password-screen {
            text-align: center;
            animation: fadeUp 0.6s ease;
        }
        #password-screen h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #7ab6ff, #4a90e2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #password-screen p {
            color: #8899bb;
            margin-bottom: 28px;
            font-size: 0.95rem;
        }
        .password-input {
            padding: 12px 20px;
            font-size: 1rem;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            color: #e8ecf4;
            font-family: inherit;
            width: 260px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }
        .password-input:focus { border-color: #4a90e2; }
        .password-input::placeholder { color: #667799; }
        .password-btn {
            display: block;
            margin: 16px auto 0;
            padding: 10px 32px;
            background: linear-gradient(to right, #3953b3, #5a80d8);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
        }
        .password-btn:hover { background: linear-gradient(to right, #4a63c3, #6a90e8); }
        .password-error {
            color: #e57373;
            font-size: 0.85rem;
            margin-top: 12px;
            min-height: 20px;
        }

        /* Chat screen */
        #chat-screen {
            display: none;
            width: 100%;
            max-width: 640px;
            height: 85vh;
            flex-direction: column;
            background: rgba(15, 28, 52, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            animation: fadeUp 0.5s ease;
        }
        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-header h2 {
            font-size: 1.3rem;
            letter-spacing: 3px;
            font-weight: 500;
        }
        .chat-header a {
            color: #8899bb;
            font-size: 0.85rem;
            text-decoration: none;
        }
        .chat-header a:hover { color: #b0c4f0; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.98rem;
            line-height: 1.8;
            animation: msgIn 0.3s ease;
        }
        .msg.bot {
            align-self: flex-start;
            background: rgba(74, 144, 226, 0.15);
            border: 1px solid rgba(74, 144, 226, 0.2);
            border-bottom-left-radius: 4px;
        }
        .msg.user {
            align-self: flex-end;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-right-radius: 4px;
        }
        .msg .coming-soon {
            display: block;
            margin-top: 8px;
            font-size: 0.82rem;
            color: #8899bb;
            font-style: italic;
        }

        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #e8ecf4;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-input:focus { border-color: #4a90e2; }
        .chat-input::placeholder { color: #556688; }
        .chat-send {
            padding: 12px 20px;
            background: linear-gradient(to right, #3953b3, #5a80d8);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .chat-send:hover { background: linear-gradient(to right, #4a63c3, #6a90e8); }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 640px) {
            body { padding: 10px; }
            #chat-screen { height: 90vh; border-radius: 12px; }
            .msg { max-width: 88%; }
        }
    </style>
</head>
<body>
    <!-- Password Screen -->
    <div id="password-screen">
        <h1>讀畫樓</h1>
        <p>请输入访问密码</p>
        <input type="password" id="pw-input" class="password-input" placeholder="密码" autofocus>
        <button class="password-btn" onclick="checkPassword()">进入</button>
        <div class="password-error" id="pw-error"></div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen">
        <div class="chat-header">
            <h2>讀畫樓助手</h2>
            <a href="index.html">← 返回首页</a>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="msg bot">
                欢迎来到讀畫樓助手！🏛️
                <span class="coming-soon">聊天功能即将上线，敬请期待。</span>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" class="chat-input" placeholder="输入消息..." disabled>
            <button class="chat-send" id="chat-send" onclick="sendMessage()" disabled>发送</button>
        </div>
    </div>

    <script>
    var PASSWORD = 'readgallery2026';

    function checkPassword() {
        var input = document.getElementById('pw-input');
        if (input.value === PASSWORD) {
            document.getElementById('password-screen').style.display = 'none';
            var chat = document.getElementById('chat-screen');
            chat.style.display = 'flex';
            // Enable input for mockup interaction
            document.getElementById('chat-input').disabled = false;
            document.getElementById('chat-send').disabled = false;
            document.getElementById('chat-input').focus();
        } else {
            document.getElementById('pw-error').textContent = '密码错误，请重试';
            input.value = '';
            input.focus();
        }
    }

    document.getElementById('pw-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') checkPassword();
    });

    function sendMessage() {
        var input = document.getElementById('chat-input');
        var text = input.value.trim();
        if (!text) return;

        var messages = document.getElementById('chat-messages');

        // Add user message
        var userMsg = document.createElement('div');
        userMsg.className = 'msg user';
        userMsg.textContent = text;
        messages.appendChild(userMsg);

        input.value = '';
        messages.scrollTop = messages.scrollHeight;

        // Bot reply (static mockup)
        setTimeout(function() {
            var botMsg = document.createElement('div');
            botMsg.className = 'msg bot';
            botMsg.innerHTML = '感谢您的消息！讀畫樓智能助手正在开发中，即将上线。<span class="coming-soon">如需咨询，请发邮件至 allison@read-gallery.com</span>';
            messages.appendChild(botMsg);
            messages.scrollTop = messages.scrollHeight;
        }, 800);
    }

    document.getElementById('chat-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendMessage();
    });
    </script>
</body>
</html>

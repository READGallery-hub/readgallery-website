<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>讀畫樓助手</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #1a2a4a 0%, #0f1d3e 50%, #14294d 100%);
            color: #e8ecf4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        /* Password screen */
        #password-screen { text-align: center; animation: fadeUp 0.6s ease; }
        #password-screen h1 {
            font-size: 2.2rem; letter-spacing: 4px; margin-bottom: 8px;
            background: linear-gradient(45deg, #7ab6ff, #4a90e2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #password-screen p { color: #8899bb; margin-bottom: 28px; font-size: 0.95rem; }
        .password-input {
            padding: 12px 20px; font-size: 1rem; border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 8px; background: rgba(255,255,255,0.06); color: #e8ecf4;
            font-family: inherit; width: 260px; text-align: center; outline: none; transition: border-color 0.3s;
        }
        .password-input:focus { border-color: #4a90e2; }
        .password-input::placeholder { color: #667799; }
        .password-btn {
            display: block; margin: 16px auto 0; padding: 10px 32px;
            background: linear-gradient(to right, #3953b3, #5a80d8); color: #fff; border: none;
            border-radius: 8px; font-size: 1rem; font-family: inherit; cursor: pointer; transition: all 0.3s;
        }
        .password-btn:hover { background: linear-gradient(to right, #4a63c3, #6a90e8); }
        .password-error { color: #e57373; font-size: 0.85rem; margin-top: 12px; min-height: 20px; }

        /* Chat screen */
        #chat-screen {
            display: none; width: 100%; max-width: 640px; height: 85vh;
            flex-direction: column; background: rgba(15, 28, 52, 0.6);
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden; animation: fadeUp 0.5s ease;
        }
        .chat-header {
            padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: space-between;
        }
        .chat-header h2 { font-size: 1.3rem; letter-spacing: 3px; font-weight: 500; }
        .chat-status { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #8899bb; }
        .chat-status .dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; }
        .chat-header a, .chat-header button.header-btn {
            color: #8899bb; font-size: 0.85rem; text-decoration: none; background: none;
            border: none; cursor: pointer; font-family: inherit;
        }
        .chat-header a:hover, .chat-header button.header-btn:hover { color: #b0c4f0; }
        .header-right { display: flex; align-items: center; gap: 14px; }

        .chat-messages {
            flex: 1; overflow-y: auto; padding: 20px 24px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .msg {
            max-width: 80%; padding: 12px 18px; border-radius: 12px;
            font-size: 0.98rem; line-height: 1.8; animation: msgIn 0.3s ease;
            white-space: pre-wrap; word-break: break-word;
        }
        .msg.bot { align-self: flex-start; background: rgba(74, 144, 226, 0.15); border: 1px solid rgba(74, 144, 226, 0.2); border-bottom-left-radius: 4px; }
        .msg.user { align-self: flex-end; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-bottom-right-radius: 4px; }
        .msg .time { display: block; font-size: 0.72rem; color: #667799; margin-top: 6px; }

        /* Image thumbnails in messages */
        .msg-images { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        .msg-images img {
            max-width: 120px; max-height: 120px; border-radius: 8px; cursor: pointer;
            object-fit: cover; border: 1px solid rgba(255,255,255,0.15);
        }
        .msg-images img:hover { border-color: #4a90e2; }

        /* Image lightbox */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center;
            cursor: pointer;
        }
        #lightbox img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 4px; }
        #lightbox.show { display: flex; }

        .typing-indicator {
            align-self: flex-start; padding: 12px 18px; border-radius: 12px;
            background: rgba(74, 144, 226, 0.1); border: 1px solid rgba(74, 144, 226, 0.15);
            border-bottom-left-radius: 4px; display: none;
        }
        .typing-indicator span {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            background: #4a90e2; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out; opacity: 0.4;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        .chat-input-area {
            padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08);
            display: flex; gap: 10px; align-items: flex-end;
        }
        .chat-input {
            flex: 1; padding: 12px 16px; font-size: 1rem;
            border: 1.5px solid rgba(255,255,255,0.12); border-radius: 10px;
            background: rgba(255,255,255,0.05); color: #e8ecf4;
            font-family: inherit; outline: none; transition: border-color 0.3s;
        }
        .chat-input:focus { border-color: #4a90e2; }
        .chat-input::placeholder { color: #556688; }
        .chat-send, .chat-photo-btn, .chat-menu-btn {
            padding: 12px 16px; background: linear-gradient(to right, #3953b3, #5a80d8);
            color: #fff; border: none; border-radius: 10px; font-size: 1rem;
            font-family: inherit; cursor: pointer; transition: all 0.3s; white-space: nowrap;
        }
        .chat-photo-btn { padding: 12px 14px; background: rgba(255,255,255,0.08); font-size: 1.2rem; }
        .chat-menu-btn { padding: 12px 14px; background: rgba(255,255,255,0.08); font-size: 1.1rem; }
        .chat-send:hover, .chat-photo-btn:hover, .chat-menu-btn:hover { opacity: 0.85; }
        .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

        .notice { text-align: center; font-size: 0.78rem; color: #556688; padding: 4px; }

        /* Inline buttons in bot messages */
        .msg-btn {
            display: inline-block; margin: 8px 4px 4px 0; padding: 10px 20px;
            background: linear-gradient(to right, #3953b3, #5a80d8); color: #fff;
            border: none; border-radius: 20px; font-size: 0.92rem; font-family: inherit;
            cursor: pointer; transition: all 0.3s; min-height: 44px;
        }
        .msg-btn:hover { opacity: 0.85; }
        .msg-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #555; }

        /* ===== MENU / WORKFLOW STYLES ===== */
        .menu-panel {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            gap: 18px; padding: 40px 24px; flex: 1; min-height: 300px; width: 100%; box-sizing: border-box;
        }
        .menu-panel.show { display: flex !important; }
        .menu-panel h3 { font-size: 1.2rem; color: #8899bb; letter-spacing: 2px; margin-bottom: 8px; }
        .menu-btn {
            width: 100%; max-width: 320px; padding: 20px 24px; border-radius: 14px;
            border: 1.5px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
            color: #e8ecf4; font-family: inherit; font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; gap: 14px; transition: all 0.3s;
        }
        .menu-btn:hover { background: rgba(74, 144, 226, 0.15); border-color: rgba(74, 144, 226, 0.3); }
        .menu-btn .menu-icon { font-size: 1.6rem; }
        .menu-btn .menu-label strong { display: block; margin-bottom: 2px; }
        .menu-btn .menu-label span { font-size: 0.82rem; color: #8899bb; }

        /* Workflow panel */
        .workflow-panel {
            display: none; flex-direction: column; flex: 1; overflow-y: auto; padding: 24px;
        }
        .workflow-panel.show { display: flex; }
        .wf-header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
        }
        .wf-back {
            background: none; border: none; color: #8899bb; font-size: 1.3rem;
            cursor: pointer; padding: 4px 8px; font-family: inherit;
        }
        .wf-back:hover { color: #b0c4f0; }
        .wf-title { font-size: 1.15rem; font-weight: 500; letter-spacing: 1px; }
        .wf-step-indicator { font-size: 0.82rem; color: #667799; margin-left: auto; }

        .wf-content { flex: 1; display: flex; flex-direction: column; gap: 16px; }
        .wf-label { font-size: 1rem; color: #b0c4f0; line-height: 1.6; }
        .wf-input {
            padding: 12px 16px; font-size: 1rem; border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 10px; background: rgba(255,255,255,0.05); color: #e8ecf4;
            font-family: inherit; outline: none; width: 100%; transition: border-color 0.3s;
        }
        .wf-input:focus { border-color: #4a90e2; }
        .wf-input::placeholder { color: #556688; }
        textarea.wf-input { min-height: 80px; resize: vertical; }
        select.wf-input { appearance: auto; }

        .wf-photo-area {
            border: 2px dashed rgba(255,255,255,0.15); border-radius: 12px;
            padding: 24px; text-align: center; cursor: pointer; transition: all 0.3s;
        }
        .wf-photo-area:hover { border-color: #4a90e2; background: rgba(74,144,226,0.05); }
        .wf-photo-area .icon { font-size: 2.2rem; margin-bottom: 8px; }
        .wf-photo-area p { color: #8899bb; font-size: 0.9rem; }

        .wf-thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .wf-thumb {
            position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .wf-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .wf-thumb .remove {
            position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7);
            color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px;
            font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .wf-btn {
            padding: 14px 28px; border-radius: 10px; border: none;
            background: linear-gradient(to right, #3953b3, #5a80d8); color: #fff;
            font-size: 1rem; font-family: inherit; cursor: pointer; transition: all 0.3s;
            align-self: center; min-width: 160px; text-align: center;
        }
        .wf-btn:hover { opacity: 0.9; }
        .wf-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .wf-btn.secondary { background: rgba(255,255,255,0.1); }

        /* Preview card */
        .preview-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px; padding: 20px; margin: 8px 0;
        }
        .preview-card h4 { font-size: 1.1rem; margin-bottom: 12px; color: #7ab6ff; }
        .preview-card .field { margin-bottom: 8px; }
        .preview-card .field label { color: #8899bb; font-size: 0.85rem; }
        .preview-card .field .val { color: #e8ecf4; font-size: 0.95rem; }
        .preview-card .preview-images { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .preview-card .preview-images img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }

        /* Loading spinner */
        .wf-loading { text-align: center; padding: 40px 20px; }
        .wf-loading .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(74,144,226,0.2);
            border-top-color: #4a90e2; border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        .wf-loading p { color: #8899bb; font-size: 0.95rem; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            body { padding: 10px; }
            #chat-screen { height: 92vh; border-radius: 12px; }
            .msg { max-width: 88%; }
            .chat-header { padding: 14px 16px; }
            .chat-messages { padding: 16px; }
            .chat-input-area { padding: 12px; }
            .workflow-panel { padding: 16px; }
            .menu-btn { padding: 16px 18px; }
        }
    </style>
</head>
<body>
    <!-- Password Screen -->
    <div id="password-screen" style="display:none;"></div>

    <!-- Chat Screen -->
    <div id="chat-screen">
        <div class="chat-header">
            <div>
                <h2>讀畫樓助手</h2>
                <div class="chat-status"><span class="dot"></span> 在线</div>
            </div>
            <div class="header-right">
                <button class="header-btn" onclick="showMenu()" title="菜单">☰ 菜单</button>
                <a href="index.html">← 返回首页</a>
            </div>
        </div>

        <!-- Menu Panel -->
        <div class="menu-panel show" id="menu-panel">
            <h3>请选择功能</h3>
            <button class="menu-btn" onclick="startWorkflow('research')">
                <span class="menu-icon">🔍</span>
                <span class="menu-label"><strong>研究藏品</strong><span>上传照片，AI帮您鉴赏研究</span></span>
            </button>
            <button class="menu-btn" onclick="startWorkflow('add')">
                <span class="menu-icon">➕</span>
                <span class="menu-label"><strong>添加新藏品</strong><span>将藏品添加到讀畫樓网站</span></span>
            </button>
            <button class="menu-btn" onclick="startFreeChat()">
                <span class="menu-icon">💬</span>
                <span class="menu-label"><strong>自由对话</strong><span>直接与助手对话</span></span>
            </button>
        </div>

        <!-- Workflow Panel (Research / Add) -->
        <div class="workflow-panel" id="workflow-panel"></div>

        <!-- Chat Messages (free chat mode) -->
        <div class="chat-messages" id="chat-messages" style="display:none;">
            <div class="typing-indicator" id="typing">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div class="chat-input-area" id="chat-input-area" style="display:none;">
            <button class="chat-menu-btn" onclick="showMenu()" title="菜单">☰</button>
            <input type="text" id="chat-input" class="chat-input" placeholder="输入消息...">
            <button class="chat-send" id="chat-send" onclick="sendMessage()">发送</button>
        </div>
        <div class="notice" id="chat-notice" style="display:none;">回复可能需要1-2分钟，请耐心等待 🙏</div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" onclick="this.classList.remove('show')"><img id="lightbox-img"></div>

    <!-- Hidden file input -->
    <input type="file" id="file-input" accept="image/*" multiple style="display:none;">

    <script>
    (function() {
        var PASSWORD = 'readgallery2026';
        var API_BASE = 'https://chat-worker.chengmu2010.workers.dev/api';
        var pollTimer = null;
        var lastTs = 0;
        var waitingForReply = false;
        var currentMode = 'menu'; // 'menu', 'chat', 'workflow'
        var currentWorkflow = null; // 'research' or 'add'
        var wfStep = 0;
        var wfData = {};
        var wfPhotos = []; // array of {dataUrl, blob}
        var fileInputCallback = null;

        // Auto-enter is deferred to end of script (after all functions defined)

        window.checkPassword = function() {};

        var pwInput = document.getElementById('pw-input');
        if (pwInput) pwInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') window.checkPassword();
        });

        function enterChat() {
            document.getElementById('password-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            showMenu();
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('menu-panel').classList.toggle('show', mode === 'menu');
            document.getElementById('workflow-panel').classList.toggle('show', mode === 'workflow');
            document.getElementById('chat-messages').style.display = mode === 'chat' ? 'flex' : 'none';
            document.getElementById('chat-input-area').style.display = mode === 'chat' ? 'flex' : 'none';
            document.getElementById('chat-notice').style.display = mode === 'chat' ? 'block' : 'none';
        }

        window.showMenu = function() {
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
            currentWorkflow = null;
            wfStep = 0;
            wfData = {};
            wfPhotos = [];
            setMode('menu');
        };

        window.startFreeChat = function() {
            try {
                setMode('chat');
                document.getElementById('chat-input').focus();
                loadMessages();
                if (pollTimer) clearInterval(pollTimer);
                pollTimer = setInterval(pollMessages, 3000);
            } catch(e) {
                alert('错误: ' + e.message);
                console.error('startFreeChat error:', e);
            }
        };

        // ========== FILE INPUT ==========
        var fileEl = document.getElementById('file-input');
        fileEl.addEventListener('change', function() {
            if (!fileEl.files.length || !fileInputCallback) return;
            var files = Array.from(fileEl.files);
            fileInputCallback(files);
            fileEl.value = '';
        });

        function pickPhotos(cb) {
            fileInputCallback = cb;
            fileEl.click();
        }

        function resizeImage(file, maxW, quality) {
            return new Promise(function(resolve) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var img = new Image();
                    img.onload = function() {
                        var w = img.width, h = img.height;
                        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                        var canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        canvas.toBlob(function(blob) {
                            var dr = new FileReader();
                            dr.onload = function() { resolve({ dataUrl: dr.result, blob: blob }); };
                            dr.readAsDataURL(blob);
                        }, 'image/jpeg', quality);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // ========== LIGHTBOX ==========
        window.openLightbox = function(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').classList.add('show');
        };

        // ========== WORKFLOW ENGINE ==========
        var RESEARCH_STEPS = [
            { id: 'photos', label: '请上传藏品照片（可多张）', type: 'photos' },
            { id: 'description', label: '请描述这件藏品（材质、尺寸、来源等）', type: 'textarea', placeholder: '例如：青铜器，高约20cm，传世品...' },
            { id: 'confirm', type: 'submit', label: '提交研究请求' }
        ];
        var ADD_STEPS = [
            { id: 'photos', label: '请上传藏品照片（可多张）', type: 'photos' },
            { id: 'name', label: '请输入藏品名称', type: 'text', placeholder: '例如：青花缠枝莲纹盘' },
            { id: 'dynasty', label: '请选择朝代', type: 'select', options: ['新石器','商','周','汉','唐','宋','元','明','清','近现代','其他'] },
            { id: 'description', label: '请描述这件藏品', type: 'textarea', placeholder: '材质、工艺、来源等...' },
            { id: 'dimensions', label: '请输入尺寸', type: 'text', placeholder: '例如：高15cm，宽8cm' },
            { id: 'preview', type: 'preview' },
            { id: 'confirm', type: 'submit', label: '确认添加到讀畫樓网站' }
        ];

        window.startWorkflow = function(type) {
            try {
                currentWorkflow = type;
                wfStep = 0;
                wfData = {};
                wfPhotos = [];
                setMode('workflow');
                renderStep();
            } catch(e) {
                alert('错误: ' + e.message);
                console.error('startWorkflow error:', e);
            }
        };

        function getSteps() {
            return currentWorkflow === 'research' ? RESEARCH_STEPS : ADD_STEPS;
        }

        function renderStep() {
            var panel = document.getElementById('workflow-panel');
            var steps = getSteps();
            var step = steps[wfStep];
            var totalVisible = steps.filter(function(s) { return s.type !== 'preview'; }).length;
            var currentVisible = steps.slice(0, wfStep + 1).filter(function(s) { return s.type !== 'preview'; }).length;
            var title = currentWorkflow === 'research' ? '🔍 研究藏品' : '➕ 添加新藏品';

            var html = '<div class="wf-header">' +
                '<button class="wf-back" onclick="wfBack()">←</button>' +
                '<span class="wf-title">' + title + '</span>' +
                '<span class="wf-step-indicator">第' + currentVisible + '步 / 共' + totalVisible + '步</span>' +
                '</div><div class="wf-content">';

            if (step.type === 'photos') {
                html += '<p class="wf-label">' + step.label + '</p>';
                html += '<div class="wf-photo-area" onclick="wfPickPhotos()"><div class="icon">📷</div><p>点击选择照片<br>支持多张</p></div>';
                html += '<div class="wf-thumbs" id="wf-thumbs">';
                wfPhotos.forEach(function(p, i) {
                    html += '<div class="wf-thumb"><img src="' + p.dataUrl + '" onclick="openLightbox(\'' + p.dataUrl.replace(/'/g, "\\'") + '\')"><button class="remove" onclick="wfRemovePhoto(' + i + ')">×</button></div>';
                });
                html += '</div>';
                html += '<button class="wf-btn" onclick="wfNext()" ' + (wfPhotos.length === 0 ? 'disabled' : '') + '>下一步</button>';
            } else if (step.type === 'text') {
                html += '<p class="wf-label">' + step.label + '</p>';
                html += '<input class="wf-input" id="wf-field" placeholder="' + (step.placeholder || '') + '" value="' + (wfData[step.id] || '') + '">';
                html += '<button class="wf-btn" onclick="wfNextField(\'' + step.id + '\')">下一步</button>';
            } else if (step.type === 'textarea') {
                html += '<p class="wf-label">' + step.label + '</p>';
                html += '<textarea class="wf-input" id="wf-field" placeholder="' + (step.placeholder || '') + '">' + (wfData[step.id] || '') + '</textarea>';
                html += '<button class="wf-btn" onclick="wfNextField(\'' + step.id + '\')">下一步</button>';
            } else if (step.type === 'select') {
                html += '<p class="wf-label">' + step.label + '</p>';
                html += '<select class="wf-input" id="wf-field">';
                step.options.forEach(function(o) {
                    html += '<option' + (wfData[step.id] === o ? ' selected' : '') + '>' + o + '</option>';
                });
                html += '</select>';
                html += '<button class="wf-btn" onclick="wfNextField(\'' + step.id + '\')">下一步</button>';
            } else if (step.type === 'preview') {
                html += renderPreview();
                html += '<button class="wf-btn" onclick="wfNext()">确认，下一步</button>';
                html += '<button class="wf-btn secondary" onclick="wfBack()" style="margin-top:8px;">返回修改</button>';
            } else if (step.type === 'submit') {
                html += '<p class="wf-label" style="text-align:center;font-size:1.1rem;">' + step.label + '？</p>';
                if (currentWorkflow === 'research') {
                    html += renderResearchSummary();
                } else {
                    html += renderPreview();
                }
                html += '<button class="wf-btn" id="wf-submit-btn" onclick="wfSubmit()">✓ 确认提交</button>';
            }

            html += '</div>';
            panel.innerHTML = html;

            // Auto-focus text inputs
            var field = document.getElementById('wf-field');
            if (field && (step.type === 'text' || step.type === 'textarea')) field.focus();
            // Enter key for text inputs
            if (field && step.type === 'text') {
                field.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { e.preventDefault(); window.wfNextField(step.id); }
                });
            }
        }

        function renderResearchSummary() {
            var html = '<div class="preview-card"><h4>研究请求摘要</h4>';
            html += '<div class="preview-images">';
            wfPhotos.forEach(function(p) { html += '<img src="' + p.dataUrl + '" onclick="openLightbox(this.src)">'; });
            html += '</div>';
            if (wfData.description) html += '<div class="field"><label>描述：</label><div class="val">' + esc(wfData.description) + '</div></div>';
            html += '</div>';
            return html;
        }

        function renderPreview() {
            var html = '<div class="preview-card"><h4>藏品预览</h4>';
            html += '<div class="preview-images">';
            wfPhotos.forEach(function(p) { html += '<img src="' + p.dataUrl + '" onclick="openLightbox(this.src)">'; });
            html += '</div>';
            if (wfData.name) html += '<div class="field"><label>名称：</label><div class="val">' + esc(wfData.name) + '</div></div>';
            if (wfData.dynasty) html += '<div class="field"><label>朝代：</label><div class="val">' + esc(wfData.dynasty) + '</div></div>';
            if (wfData.description) html += '<div class="field"><label>描述：</label><div class="val">' + esc(wfData.description) + '</div></div>';
            if (wfData.dimensions) html += '<div class="field"><label>尺寸：</label><div class="val">' + esc(wfData.dimensions) + '</div></div>';
            html += '</div>';
            return html;
        }

        function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        window.wfPickPhotos = function() {
            pickPhotos(function(files) {
                var promises = files.map(function(f) { return resizeImage(f, 1024, 0.8); });
                Promise.all(promises).then(function(results) {
                    wfPhotos = wfPhotos.concat(results);
                    renderStep();
                });
            });
        };

        window.wfRemovePhoto = function(i) {
            wfPhotos.splice(i, 1);
            renderStep();
        };

        window.wfNext = function() {
            wfStep++;
            renderStep();
        };

        window.wfNextField = function(id) {
            var el = document.getElementById('wf-field');
            var val = el ? el.value.trim() : '';
            if (!val) { el.style.borderColor = '#e57373'; return; }
            wfData[id] = val;
            wfStep++;
            renderStep();
        };

        window.wfBack = function() {
            if (wfStep > 0) { wfStep--; renderStep(); }
            else { showMenu(); }
        };

        window.wfSubmit = function() {
            var btn = document.getElementById('wf-submit-btn');
            if (btn) { btn.disabled = true; btn.textContent = '提交中...'; }

            // Upload photos first, then send action message
            uploadPhotos(wfPhotos).then(function(imageIds) {
                var payload = {
                    type: 'action',
                    action: currentWorkflow === 'research' ? 'research' : 'add_piece',
                    data: Object.assign({}, wfData, { imageIds: imageIds })
                };
                return fetch(API_BASE + '/chat', {
                    method: 'POST',
                    headers: apiHeaders(),
                    body: JSON.stringify(payload)
                });
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.ok) {
                    // Switch to chat to see the response
                    showSubmittedScreen();
                } else {
                    alert('提交失败，请重试');
                    if (btn) { btn.disabled = false; btn.textContent = '✓ 确认提交'; }
                }
            }).catch(function() {
                alert('网络错误，请重试');
                if (btn) { btn.disabled = false; btn.textContent = '✓ 确认提交'; }
            });
        };

        function uploadPhotos(photos) {
            if (!photos.length) return Promise.resolve([]);
            var promises = photos.map(function(p) {
                return fetch(API_BASE + '/chat/image', {
                    method: 'POST',
                    headers: apiHeaders(),
                    body: JSON.stringify({ image: p.dataUrl })
                }).then(function(r) { return r.json(); }).then(function(d) { return d.imageId; });
            });
            return Promise.all(promises);
        }

        function showSubmittedScreen() {
            var panel = document.getElementById('workflow-panel');
            var msg = currentWorkflow === 'research' ? '✓ 研究请求已提交！' : '✓ 藏品信息已提交！';
            panel.innerHTML = '<div class="wf-loading"><div class="spinner"></div><p>' + msg + '</p>' +
                '<p style="margin-top:16px;font-size:0.85rem;color:#667799;">正在跳转到对话...</p></div>';
            setTimeout(function() { goToChatAfterSubmit(); }, 2000);
        }

        window.goToChatAfterSubmit = function() {
            startFreeChat();
        };

        // ========== CHAT (free chat mode) ==========
        function apiHeaders() {
            return { 'Content-Type': 'application/json', 'X-Chat-Auth': PASSWORD };
        }

        function formatTime(ts) {
            var d = new Date(ts);
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }

        function addMessage(role, text, ts, imageIds) {
            var container = document.getElementById('chat-messages');
            var typing = document.getElementById('typing');
            var div = document.createElement('div');
            div.className = 'msg ' + role;

            // Show images if present
            if (imageIds && imageIds.length) {
                var imgDiv = document.createElement('div');
                imgDiv.className = 'msg-images';
                imageIds.forEach(function(id) {
                    var img = document.createElement('img');
                    img.src = API_BASE + '/chat/image/' + id;
                    img.onclick = function() { openLightbox(this.src); };
                    imgDiv.appendChild(img);
                });
                div.appendChild(imgDiv);
            }

            if (text) {
                // Parse inline buttons: {{BUTTON:label:action_type:action_data}}
                var buttonRegex = /\{\{BUTTON:(.+?):(.+?):(.+?)\}\}/g;
                var cleanText = text.replace(buttonRegex, '');
                if (cleanText.trim()) {
                    var textNode = document.createTextNode(cleanText.trim());
                    div.appendChild(textNode);
                }
                var match;
                buttonRegex.lastIndex = 0;
                while ((match = buttonRegex.exec(text)) !== null) {
                    var btnEl = document.createElement('button');
                    btnEl.className = 'msg-btn';
                    btnEl.textContent = match[1];
                    btnEl.setAttribute('data-action', match[2]);
                    btnEl.setAttribute('data-data', match[3]);
                    (function(btn, actionType, actionData) {
                        btn.onclick = function() {
                            btn.disabled = true;
                            btn.textContent = '已提交，正在生成报告...';
                            fetch(API_BASE + '/chat', {
                                method: 'POST',
                                headers: apiHeaders(),
                                body: JSON.stringify({ type: 'action', action: actionType, data: { originalMessageId: actionData } })
                            }).then(function(r) { return r.json(); }).then(function(d) {
                                if (d.ok) {
                                    waitingForReply = true;
                                    showTyping(true);
                                }
                            }).catch(function() { btn.textContent = '提交失败，请重试'; btn.disabled = false; });
                        };
                    })(btnEl, match[2], match[3]);
                    div.appendChild(btnEl);
                }
            }
            if (ts) {
                var timeSpan = document.createElement('span');
                timeSpan.className = 'time';
                timeSpan.textContent = formatTime(ts);
                div.appendChild(timeSpan);
            }
            container.insertBefore(div, typing);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping(show) {
            var el = document.getElementById('typing');
            el.style.display = show ? 'block' : 'none';
            if (show) {
                var container = document.getElementById('chat-messages');
                container.scrollTop = container.scrollHeight;
            }
        }

        function loadMessages() {
            fetch(API_BASE + '/chat?since=0', { headers: apiHeaders() })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    // Clear existing messages except typing indicator
                    var container = document.getElementById('chat-messages');
                    var typing = document.getElementById('typing');
                    while (container.firstChild !== typing && container.firstChild) {
                        container.removeChild(container.firstChild);
                    }

                    if (data.messages && data.messages.length) {
                        data.messages.forEach(function(m) {
                            var display = m.text || '';
                            if (m.type === 'action') {
                                display = m.action === 'research' ? '🔍 [研究藏品请求]' : '➕ [添加藏品请求]';
                                if (m.data && m.data.description) display += '\n' + m.data.description;
                            }
                            addMessage(m.role === 'user' ? 'user' : 'bot', display, m.ts, m.imageIds);
                            if (m.ts > lastTs) lastTs = m.ts;
                        });
                        var last = data.messages[data.messages.length - 1];
                        if (last.role === 'user' && last.processed === false) {
                            waitingForReply = true;
                            showTyping(true);
                        }
                    } else {
                        addMessage('bot', '欢迎来到讀畫樓！🏛️\n\n我是讀畫樓助手，有什么可以帮您的吗？\n\n点击左下角 ☰ 菜单可以选择：\n🔍 研究藏品\n➕ 添加新藏品\n💬 自由对话', Date.now());
                    }
                })
                .catch(function() {
                    addMessage('bot', '连接服务器失败，请稍后刷新页面重试。', Date.now());
                });
        }

        function pollMessages() {
            if (currentMode !== 'chat') return;
            fetch(API_BASE + '/chat?since=' + lastTs, { headers: apiHeaders() })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.messages && data.messages.length) {
                        data.messages.forEach(function(m) {
                            var display = m.text || '';
                            if (m.type === 'action') {
                                display = m.action === 'research' ? '🔍 [研究藏品请求]' : '➕ [添加藏品请求]';
                            }
                            addMessage(m.role === 'user' ? 'user' : 'bot', display, m.ts, m.imageIds);
                            if (m.ts > lastTs) lastTs = m.ts;
                            if (m.role === 'bot') { waitingForReply = false; showTyping(false); }
                        });
                    }
                })
                .catch(function() {});
        }

        window.sendMessage = function() {
            var input = document.getElementById('chat-input');
            var text = input.value.trim();
            if (!text) return;

            var btn = document.getElementById('chat-send');
            btn.disabled = true;
            input.value = '';

            fetch(API_BASE + '/chat', {
                method: 'POST',
                headers: apiHeaders(),
                body: JSON.stringify({ text: text })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.ok) {
                    addMessage('user', text, data.message.ts);
                    lastTs = data.message.ts;
                    waitingForReply = true;
                    showTyping(true);
                } else if (data.error === 'rate_limited') {
                    addMessage('bot', '⚠️ 发送太频繁了，请稍等一会儿再试。', Date.now());
                } else {
                    addMessage('bot', '⚠️ 发送失败，请重试。', Date.now());
                }
                btn.disabled = false;
                input.focus();
            })
            .catch(function() {
                addMessage('bot', '⚠️ 网络错误，请检查网络后重试。', Date.now());
                btn.disabled = false;
            });
        };

        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                window.sendMessage();
            }
        });
        // Cloudflare Access gates the site — no password needed
        enterChat();
    })();
    </script>
</body>
</html>

    <style>
        /* === Collection Page Luxury Redesign === */
        .collection-section {
            background: var(--gallery-bg);
            min-height: 100vh;
            padding: 120px 0 80px;
        }

        /* Section header */
        .collection-section .section-header {
            text-align: center;
            margin-bottom: 50px;
        }
        .collection-section .section-title {
            font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
            color: var(--gallery-text);
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            margin-bottom: 16px;
        }
        .collection-section .title-decoration {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a84c, transparent);
            margin: 0 auto;
        }

        /* Dynasty filter bar */
        .dynasty-filter {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 48px;
            padding: 0 16px;
        }
        .dynasty-pill {
            font-family: 'Noto Serif SC', serif;
            font-size: 0.85rem;
            padding: 8px 20px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            background: transparent;
            color: var(--gallery-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .dynasty-pill:hover {
            border-color: var(--gallery-secondary);
            color: rgba(255,255,255,0.85);
        }
        .dynasty-pill.active {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.5);
            color: var(--gallery-text);
        }

        /* Grid */
        .collection-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 28px;
            padding: 0 16px;
            max-width: 1200px;
            margin: 0 auto;
        }
        @media (min-width: 640px) {
            .collection-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (min-width: 1024px) {
            .collection-grid { grid-template-columns: repeat(3, 1fr); }
        }

        /* Cards */
        .artwork-card {
            background: var(--gallery-card);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.06);
            transition: transform 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
            opacity: 1;
        }
        .artwork-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .artwork-card.filter-hide {
            display: none;
        }
        .artwork-card.filter-show {
            animation: fadeCardIn 0.4s ease forwards;
        }
        @keyframes fadeCardIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .artwork-image {
            position: relative;
            width: 100%;
            padding-top: 66.67%; /* 3:2 */
            overflow: hidden;
            background: var(--gallery-bg);
        }
        .artwork-image img {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .artwork-card:hover .artwork-image img {
            transform: scale(1.04);
        }

        .artwork-info {
            padding: 20px;
        }
        .artwork-title {
            font-family: 'Cormorant Garamond', 'Noto Serif SC', serif;
            color: var(--gallery-text);
            font-size: 1.1rem;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .artwork-period-tag {
            display: inline-block;
            font-family: 'Lora', serif;
            font-size: 0.72rem;
            color: var(--gallery-secondary);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 3px;
            padding: 2px 10px;
            margin-bottom: 10px;
            letter-spacing: 0.05em;
        }
        .artwork-brief {
            font-family: 'Lora', 'Noto Serif SC', serif;
            font-size: 0.85rem;
            color: var(--gallery-secondary);
            line-height: 1.6;
        }

        /* Footer on dark bg */
        .footer-enhanced {
            background: #0a0a15;
        }
    </style>
</head>

    <script>
    (function(){
        var btn=document.getElementById('hamburger'),nav=document.getElementById('nav-links');
        if(btn&&nav){btn.addEventListener('click',function(){var o=nav.classList.toggle('open');btn.classList.toggle('active');btn.setAttribute('aria-expanded',o);});
        nav.querySelectorAll('.nav-link').forEach(function(l){l.addEventListener('click',function(){nav.classList.remove('open');btn.classList.remove('active');});});}

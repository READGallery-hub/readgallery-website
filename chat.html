<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>讀畫樓助手</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: #0d0d1a;
            color: #e8ecf4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        /* Password screen */
        #password-screen { text-align: center; animation: fadeUp 0.6s ease; }
        #password-screen h1 {
            font-size: 2.2rem; letter-spacing: 4px; margin-bottom: 8px;
            background: linear-gradient(45deg, #7ab6ff, #4a90e2);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        #password-screen p { color: #8899bb; margin-bottom: 28px; font-size: 0.95rem; }
        .password-input {
            padding: 12px 20px; font-size: 1rem; border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 8px; background: rgba(255,255,255,0.06); color: #e8ecf4;
            font-family: inherit; width: 260px; text-align: center; outline: none; transition: border-color 0.3s;
        }
        .password-input:focus { border-color: #4a90e2; }
        .password-input::placeholder { color: #667799; }
        .password-btn {
            display: block; margin: 16px auto 0; padding: 10px 32px;
            background: linear-gradient(to right, #3953b3, #5a80d8); color: #fff; border: none;
            border-radius: 8px; font-size: 1rem; font-family: inherit; cursor: pointer; transition: all 0.3s;
        }
        .password-btn:hover { background: linear-gradient(to right, #4a63c3, #6a90e8); }
        .password-error { color: #e57373; font-size: 0.85rem; margin-top: 12px; min-height: 20px; }

        /* Chat screen */
        #chat-screen {
            display: none; width: 100%; max-width: 640px; height: 85vh;
            flex-direction: column; background: rgba(15, 28, 52, 0.6);
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden; animation: fadeUp 0.5s ease;
        }
        .chat-header {
            padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: space-between;
        }
        .chat-header h2 { font-size: 1.3rem; letter-spacing: 3px; font-weight: 500; }
        .chat-status { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: #8899bb; }
        .chat-status .dot { width: 7px; height: 7px; border-radius: 50%; background: #4caf50; }
        .chat-header a, .chat-header button.header-btn {
            color: #8899bb; font-size: 0.85rem; text-decoration: none; background: none;
            border: none; cursor: pointer; font-family: inherit;
        }
        .chat-header a:hover, .chat-header button.header-btn:hover { color: #b0c4f0; }
        .header-right { display: flex; align-items: center; gap: 14px; }

        .chat-messages {
            flex: 1; overflow-y: auto; padding: 20px 24px;
            display: flex; flex-direction: column; gap: 16px;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .msg {
            max-width: 80%; padding: 12px 18px; border-radius: 12px;
            font-size: 0.98rem; line-height: 1.8; animation: msgIn 0.3s ease;
            white-space: pre-wrap; word-break: break-word;
        }
        .msg.bot { align-self: flex-start; background: rgba(74, 144, 226, 0.15); border: 1px solid rgba(74, 144, 226, 0.2); border-bottom-left-radius: 4px; }
        .msg.user { align-self: flex-end; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-bottom-right-radius: 4px; }
        .msg .time { display: block; font-size: 0.72rem; color: #667799; margin-top: 6px; }

        /* Image thumbnails in messages */
        .msg-images { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        .msg-images img {
            max-width: 120px; max-height: 120px; border-radius: 8px; cursor: pointer;
            object-fit: cover; border: 1px solid rgba(255,255,255,0.15);
        }
        .msg-images img:hover { border-color: #4a90e2; }

        /* Image lightbox */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 9999; align-items: center; justify-content: center;
            cursor: pointer;
        }
        #lightbox img { max-width: 95%; max-height: 95%; object-fit: contain; border-radius: 4px; }
        #lightbox.show { display: flex; }

        .typing-indicator {
            align-self: flex-start; padding: 12px 18px; border-radius: 12px;
            background: rgba(74, 144, 226, 0.1); border: 1px solid rgba(74, 144, 226, 0.15);
            border-bottom-left-radius: 4px; display: none;
        }
        .typing-indicator span {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            background: #4a90e2; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out; opacity: 0.4;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        .chat-input-area {
            padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.08);
            display: flex; gap: 10px; align-items: flex-end;
        }
        .chat-input {
            flex: 1; padding: 12px 16px; font-size: 1rem;
            border: 1.5px solid rgba(255,255,255,0.12); border-radius: 10px;
            background: rgba(255,255,255,0.05); color: #e8ecf4;
            font-family: inherit; outline: none; transition: border-color 0.3s;
        }
        .chat-input:focus { border-color: #4a90e2; }
        .chat-input::placeholder { color: #556688; }
        .chat-send, .chat-photo-btn, .chat-menu-btn {
            padding: 12px 16px; background: linear-gradient(to right, #3953b3, #5a80d8);
            color: #fff; border: none; border-radius: 10px; font-size: 1rem;
            font-family: inherit; cursor: pointer; transition: all 0.3s; white-space: nowrap;
        }
        .chat-photo-btn { padding: 12px 14px; background: rgba(255,255,255,0.08); font-size: 1.2rem; }
        .chat-menu-btn { padding: 12px 14px; background: rgba(255,255,255,0.08); font-size: 1.1rem; }
        .chat-send:hover, .chat-photo-btn:hover, .chat-menu-btn:hover { opacity: 0.85; }
        .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

        .notice { text-align: center; font-size: 0.78rem; color: #556688; padding: 4px; }

        /* Inline buttons in bot messages */
        .msg-btn {
            display: inline-block; margin: 8px 4px 4px 0; padding: 10px 20px;
            background: linear-gradient(to right, #3953b3, #5a80d8); color: #fff;
            border: none; border-radius: 20px; font-size: 0.92rem; font-family: inherit;
            cursor: pointer; transition: all 0.3s; min-height: 44px;
        }
        .msg-btn:hover { opacity: 0.85; }
        .msg-btn:disabled { opacity: 0.5; cursor: not-allowed; background: #555; }

        /* ===== MENU / WORKFLOW STYLES ===== */
        .menu-panel {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            gap: 18px; padding: 40px 24px; flex: 1; min-height: 300px; width: 100%; box-sizing: border-box;
        }
        .menu-panel.show { display: flex !important; }
        .menu-panel h3 { font-size: 1.2rem; color: #8899bb; letter-spacing: 2px; margin-bottom: 8px; }
        .menu-btn {
            width: 100%; max-width: 320px; padding: 20px 24px; border-radius: 14px;
            border: 1.5px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
            color: #e8ecf4; font-family: inherit; font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; gap: 14px; transition: all 0.3s;
        }
        .menu-btn:hover { background: rgba(74, 144, 226, 0.15); border-color: rgba(74, 144, 226, 0.3); }
        .menu-btn .menu-icon { font-size: 1.6rem; }
        .menu-btn .menu-label strong { display: block; margin-bottom: 2px; }
        .menu-btn .menu-label span { font-size: 0.82rem; color: #8899bb; }

        /* Workflow panel */
        .workflow-panel {
            display: none; flex-direction: column; flex: 1; overflow-y: auto; padding: 24px;
        }
        .workflow-panel.show { display: flex; }
        .wf-header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
        }
        .wf-back {
            background: none; border: none; color: #8899bb; font-size: 1.3rem;
            cursor: pointer; padding: 4px 8px; font-family: inherit;
        }
        .wf-back:hover { color: #b0c4f0; }
        .wf-title { font-size: 1.15rem; font-weight: 500; letter-spacing: 1px; }
        .wf-step-indicator { font-size: 0.82rem; color: #667799; margin-left: auto; }

        .wf-content { flex: 1; display: flex; flex-direction: column; gap: 16px; }
        .wf-label { font-size: 1rem; color: #b0c4f0; line-height: 1.6; }
        .wf-input {
            padding: 12px 16px; font-size: 1rem; border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 10px; background: rgba(255,255,255,0.05); color: #e8ecf4;
            font-family: inherit; outline: none; width: 100%; transition: border-color 0.3s;
        }
        .wf-input:focus { border-color: #4a90e2; }
        .wf-input::placeholder { color: #556688; }
        textarea.wf-input { min-height: 80px; resize: vertical; }
        select.wf-input { appearance: auto; }

        .wf-photo-area {
            border: 2px dashed rgba(255,255,255,0.15); border-radius: 12px;
            padding: 24px; text-align: center; cursor: pointer; transition: all 0.3s;
        }
        .wf-photo-area:hover { border-color: #4a90e2; background: rgba(74,144,226,0.05); }
        .wf-photo-area .icon { font-size: 2.2rem; margin-bottom: 8px; }
        .wf-photo-area p { color: #8899bb; font-size: 0.9rem; }

        .wf-thumbs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .wf-thumb {
            position: relative; width: 80px; height: 80px; border-radius: 8px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .wf-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .wf-thumb .remove {
            position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7);
            color: #fff; border: none; border-radius: 50%; width: 22px; height: 22px;
            font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .wf-btn {
            padding: 14px 28px; border-radius: 10px; border: none;
            background: linear-gradient(to right, #3953b3, #5a80d8); color: #fff;
            font-size: 1rem; font-family: inherit; cursor: pointer; transition: all 0.3s;
            align-self: center; min-width: 160px; text-align: center;
        }
        .wf-btn:hover { opacity: 0.9; }
        .wf-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .wf-btn.secondary { background: rgba(255,255,255,0.1); }

        /* Preview card */
        .preview-card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px; padding: 20px; margin: 8px 0;
        }
        .preview-card h4 { font-size: 1.1rem; margin-bottom: 12px; color: #7ab6ff; }
        .preview-card .field { margin-bottom: 8px; }
        .preview-card .field label { color: #8899bb; font-size: 0.85rem; }
        .preview-card .field .val { color: #e8ecf4; font-size: 0.95rem; }
        .preview-card .preview-images { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .preview-card .preview-images img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }

        /* ===== TASK LIST STYLES ===== */
        .task-panel {
            display: none; flex-direction: column; flex: 1; overflow-y: auto; padding: 24px;
        }
        .task-panel.show { display: flex; }
        .task-header {
            display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
        }
        .task-stats {
            display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .task-stat {
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; padding: 12px 16px; flex: 1; min-width: 80px; text-align: center;
        }
        .task-stat .stat-num { font-size: 1.5rem; font-weight: 500; color: #7ab6ff; }
        .task-stat .stat-label { font-size: 0.75rem; color: #667799; margin-top: 2px; }
        .task-stat.gold .stat-num { color: #c9a84c; }
        .task-add-area {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .task-add-input {
            flex: 1; padding: 12px 16px; font-size: 1rem;
            border: 1.5px solid rgba(255,255,255,0.12); border-radius: 10px;
            background: rgba(255,255,255,0.05); color: #e8ecf4;
            font-family: inherit; outline: none; transition: border-color 0.3s;
        }
        .task-add-input:focus { border-color: #4a90e2; }
        .task-add-input::placeholder { color: #556688; }
        .task-add-btn {
            padding: 12px 20px; background: linear-gradient(to right, #3953b3, #5a80d8);
            color: #fff; border: none; border-radius: 10px; font-size: 1rem;
            font-family: inherit; cursor: pointer; transition: all 0.3s; white-space: nowrap;
        }
        .task-add-btn:hover { opacity: 0.85; }
        .task-filter-tabs {
            display: flex; gap: 8px; margin-bottom: 16px;
        }
        .task-filter-tab {
            padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            background: transparent; color: #8899bb; font-size: 0.85rem;
            font-family: inherit; cursor: pointer; transition: all 0.3s;
        }
        .task-filter-tab.active {
            background: rgba(74, 144, 226, 0.15); border-color: rgba(74, 144, 226, 0.3); color: #e8ecf4;
        }
        .task-list { display: flex; flex-direction: column; gap: 8px; }
        .task-item {
            display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px;
            background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px; transition: all 0.3s; animation: msgIn 0.3s ease;
        }
        .task-item:hover { background: rgba(255,255,255,0.06); }
        .task-item.done { opacity: 0.5; }
        .task-item.done .task-text { text-decoration: line-through; color: #556688; }
        .task-checkbox {
            width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
            background: transparent; cursor: pointer; flex-shrink: 0; margin-top: 2px;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s;
            color: transparent; font-size: 0.7rem;
        }
        .task-checkbox:hover { border-color: #4a90e2; }
        .task-checkbox.checked {
            background: #4a90e2; border-color: #4a90e2; color: #fff;
        }
        .task-content { flex: 1; min-width: 0; }
        .task-text { font-size: 0.95rem; color: #e8ecf4; line-height: 1.5; word-break: break-word; }
        .task-meta { font-size: 0.72rem; color: #556688; margin-top: 4px; }
        .task-delete {
            background: none; border: none; color: #556688; cursor: pointer;
            font-size: 0.85rem; padding: 4px 8px; transition: color 0.3s; flex-shrink: 0;
        }
        .task-delete:hover { color: #e57373; }
        .task-empty {
            text-align: center; padding: 40px 20px; color: #556688; font-size: 0.95rem;
        }
        .task-empty .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
        .task-section-label {
            font-size: 0.8rem; color: #556688; letter-spacing: 1px; margin: 16px 0 8px;
            text-transform: uppercase;
        }
        @keyframes taskDone {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); background: rgba(74,144,226,0.1); }
            100% { transform: scale(1); }
        }
        .task-item.just-done { animation: taskDone 0.4s ease; }

        /* Loading spinner */
        .wf-loading { text-align: center; padding: 40px 20px; }
        .wf-loading .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(74,144,226,0.2);
            border-top-color: #4a90e2; border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        .wf-loading p { color: #8899bb; font-size: 0.95rem; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            body { padding: 10px; }
            #chat-screen { height: 92vh; border-radius: 12px; }
            .msg { max-width: 88%; }
            .chat-header { padding: 14px 16px; }
            .chat-messages { padding: 16px; }
            .chat-input-area { padding: 12px; }
            .workflow-panel { padding: 16px; }
            .menu-btn { padding: 16px 18px; }
        }
    </style>
</head>
<body>
    <!-- Password Screen -->
    <div id="password-screen" style="display:none;"></div>

    <!-- Chat Screen -->
    <div id="chat-screen">
        <div class="chat-header">
            <div>
                <h2>讀畫樓助手</h2>
                <div class="chat-status"><span class="dot"></span> 在线</div>
            </div>
            <div class="header-right">
                <button class="header-btn" onclick="showMenu()" title="菜单">☰ 菜单</button>
                <a href="index.html">← 返回首页</a>
            </div>
        </div>

        <!-- Menu Panel -->
        <div class="menu-panel show" id="menu-panel">
            <h3>请选择功能</h3>
            <button class="menu-btn" onclick="startWorkflow('research')">
                <span class="menu-icon">🔍</span>
                <span class="menu-label"><strong>研究藏品</strong><span>上传照片，AI帮您鉴赏研究</span></span>
            </button>
            <button class="menu-btn" onclick="startWorkflow('add')">
                <span class="menu-icon">➕</span>
                <span class="menu-label"><strong>添加新藏品</strong><span>将藏品添加到讀畫樓网站</span></span>
            </button>
            <button class="menu-btn" onclick="startWorkflow('delete')">
                <span class="menu-icon">🗑️</span>
                <span class="menu-label"><strong>删除藏品</strong><span>从讀畫樓网站移除藏品</span></span>
            </button>
            <button class="menu-btn" onclick="openTaskList()">
                <span class="menu-icon">📋</span>
                <span class="menu-label"><strong>工作日志</strong><span>添加待办事项，记录完成进度</span></span>
            </button>
            <button class="menu-btn" onclick="startFreeChat()">
                <span class="menu-icon">💬</span>
                <span class="menu-label"><strong>自由对话</strong><span>直接与助手对话</span></span>
            </button>
        </div>

        <!-- Workflow Panel (Research / Add) -->
        <div class="workflow-panel" id="workflow-panel"></div>

        <!-- Task List Panel -->
        <div class="task-panel" id="task-panel"></div>

        <!-- Chat Messages (free chat mode) -->
        <div class="chat-messages" id="chat-messages" style="display:none;">
            <div class="typing-indicator" id="typing">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div class="chat-input-area" id="chat-input-area" style="display:none;">
            <button class="chat-menu-btn" onclick="showMenu()" title="菜单">☰</button>
            <button class="chat-photo-btn" onclick="chatPickPhoto()" title="发送照片">📷</button>
            <input type="text" id="chat-input" class="chat-input" placeholder="输入消息...">
            <button class="chat-send" id="chat-send" onclick="sendMessage()">发送</button>
        </div>
        <!-- Photo preview bar (shown when photos selected in free chat) -->
        <div id="chat-photo-preview" style="display:none; padding:8px 20px; border-top:1px solid rgba(255,255,255,0.08); display:none;">
            <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap;" id="chat-photo-thumbs"></div>
        </div>
        <div class="notice" id="chat-notice" style="display:none;">回复可能需要1-2分钟，请耐心等待 🙏</div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" onclick="this.classList.remove('show')"><img id="lightbox-img"></div>

    <!-- Hidden file input -->
    <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp,image/gif" multiple style="display:none;">

    <script>
    (function() {
        var PASSWORD = 'readgallery2026';
        var API_BASE = '/api';
        var pollTimer = null;
        var lastTs = 0;
        var waitingForReply = false;
        var currentMode = 'menu'; // 'menu', 'chat', 'workflow', 'tasks'
        var currentWorkflow = null; // 'research' or 'add'
        var wfStep = 0;
        var wfData = {};
        var wfPhotos = []; // array of {dataUrl, blob}
        var lastResearchImageIds = []; // imageIds from most recent research submission
        var lastResearchDescription = ''; // description from most recent research
        var fileInputCallback = null;
        var currentUser = { email: null, name: '用户' }; // populated from CF Access

        // Detect user identity from Cloudflare Access
        (function detectUser() {
            fetch('/cdn-cgi/access/get-identity', { credentials: 'same-origin' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data && data.email) {
                        currentUser.email = data.email;
                        currentUser.name = data.name || data.email.split('@')[0];
                        // Update header with user name
                        var statusEl = document.querySelector('.chat-status');
                        if (statusEl) statusEl.innerHTML = '<span class="dot"></span> ' + currentUser.name;
                    }
                })
                .catch(function() { /* CF Access not available (local dev) — continue as before */ });
        })();

        // Auto-enter is deferred to end of script (after all functions defined)

        window.checkPassword = function() {};

        var pwInput = document.getElementById('pw-input');
        if (pwInput) pwInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') window.checkPassword();
        });

        function enterChat() {

            document.getElementById('chat-screen').style.display = 'flex';
            showMenu();
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('menu-panel').classList.toggle('show', mode === 'menu');
            document.getElementById('workflow-panel').classList.toggle('show', mode === 'workflow');
            document.getElementById('task-panel').classList.toggle('show', mode === 'tasks');
            document.getElementById('chat-messages').style.display = mode === 'chat' ? 'flex' : 'none';
            document.getElementById('chat-input-area').style.display = mode === 'chat' ? 'flex' : 'none';

        window.showMenu = function() {
            if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

        window.startFreeChat = function() {
            try {
                setMode('chat');
                document.getElementById('chat-input').focus();
                loadMessages();
                if (pollTimer) clearInterval(pollTimer);
                pollTimer = setInterval(pollMessages, 3000);
            } catch(e) {
                alert('错误: ' + e.message);
                console.error('startFreeChat error:', e);
            }

        // ========== FILE INPUT ==========
        var fileEl = document.getElementById('file-input');

        function handleFileSelection() {
            if (!fileEl.files || !fileEl.files.length || !fileInputCallback) return;
            var files = Array.from(fileEl.files);
            // Filter out any zero-byte files (Android ghost selections)
            files = files.filter(function(f) { return f.size > 0; });
            if (files.length === 0) return;
            var cb = fileInputCallback;
            fileInputCallback = null;
            fileEl.value = '';
            cb(files);
        }

        fileEl.addEventListener('change', handleFileSelection);

        function pickPhotos(cb) {
            fileInputCallback = cb;
            // Reset the input completely to ensure Android re-triggers
            var parent = fileEl.parentNode;
            var newInput = fileEl.cloneNode(false);
            parent.replaceChild(newInput, fileEl);
            fileEl = newInput;
            fileEl.addEventListener('change', handleFileSelection);
            // Small delay for Android WebView compatibility
            setTimeout(function() { fileEl.click(); }, 100);
        }

        function resizeImage(file, maxW, quality) {
            return new Promise(function(resolve) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var img = new Image();
                    img.onload = function() {
                        var w = img.width, h = img.height;
                        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
                        var canvas = document.createElement('canvas');
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        canvas.toBlob(function(blob) {
                            var dr = new FileReader();
                            dr.onload = function() { resolve({ dataUrl: dr.result, blob: blob }); };
                            dr.readAsDataURL(blob);
                        }, 'image/jpeg', quality);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // ========== LIGHTBOX ==========
        window.openLightbox = function(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').classList.add('show');
        };

        // ========== WORKFLOW ENGINE ==========
        var RESEARCH_STEPS = [
            { id: 'photos', label: '请上传藏品照片（可多张）', type: 'photos' },
            { id: 'description', label: '请描述这件藏品（材质、尺寸、来源等）', type: 'textarea', placeholder: '例如：青铜器，高约20cm，传世品...' },
            { id: 'confirm', type: 'submit', label: '提交研究请求' }
        ];
        var ADD_STEPS = [
            { id: 'photos', label: '请上传藏品照片（可多张）', type: 'photos' },
            { id: 'name', label: '请输入藏品名称', type: 'text', placeholder: '例如：青花缠枝莲纹盘' },
            { id: 'dynasty', label: '请选择朝代', type: 'select', options: ['新石器','商','周','汉','唐','宋','元','明','清','近现代','其他'] },
            { id: 'description', label: '请描述这件藏品', type: 'textarea', placeholder: '材质、工艺、来源等...' },
            { id: 'dimensions', label: '请输入尺寸', type: 'text', placeholder: '例如：高15cm，宽8cm' },
            { id: 'preview', type: 'preview' },
            { id: 'confirm', type: 'submit', label: '确认添加到讀畫樓网站' }
        ];
        var DELETE_STEPS = [
            { id: 'name', label: '请输入要删除的藏品名称', type: 'text', placeholder: '例如：隋代四系贴花莲纹罐' },
            { id: 'reason', label: '删除原因（选填）', type: 'textarea', placeholder: '例如：信息有误、已售出...' },
            { id: 'confirm', type: 'submit', label: '⚠️ 确认删除此藏品' }
        ];

        window.startWorkflow = function(type) {
            try {
                currentWorkflow = type;
                wfStep = 0;
                wfData = {};
                wfPhotos = [];

                // For add_piece: pre-populate from last research submission
                if (type === 'add') {
                    var savedPhotos = null;
                    var savedIds = null;
                    var savedDesc = '';
                    try { savedPhotos = JSON.parse(localStorage.getItem('lastResearchPhotos')); } catch(e) {}
                    try { savedIds = JSON.parse(localStorage.getItem('lastResearchImageIds')); } catch(e) {}
                    try { savedDesc = localStorage.getItem('lastResearchDescription') || ''; } catch(e) {}

                    if (savedPhotos && savedPhotos.length > 0) {
                        // Convert saved dataUrls back to photo objects (no blob needed - we have imageIds)
                        wfPhotos = savedPhotos.map(function(dataUrl) {
                            return { dataUrl: dataUrl, blob: null };
                        });
                        // Pre-fill description from research
                        if (savedDesc) {
                            wfData.description = savedDesc;
                            // Try to extract name from description (first line or whole thing)
                            var firstLine = savedDesc.split('\n')[0].trim();
                            if (firstLine.length < 30) wfData.name = firstLine;
                        }
                        // Store the already-uploaded imageIds so we don't re-upload
                        wfData._existingImageIds = savedIds;
                    }
                }

                setMode('workflow');
                renderStep();
            } catch(e) {
                alert('错误: ' + e.message);
                console.error('startWorkflow error:', e);
            }
        };

        function getSteps() {
            if (currentWorkflow === 'research') return RESEARCH_STEPS;
            if (currentWorkflow === 'delete') return DELETE_STEPS;
            return ADD_STEPS;
        }

        function renderStep() {
            var panel = document.getElementById('workflow-panel');
            var steps = getSteps();
            var step = steps[wfStep];
            var totalVisible = steps.filter(function(s) { return s.type !== 'preview'; }).length;
            var currentVisible = steps.slice(0, wfStep + 1).filter(function(s) { return s.type !== 'preview'; }).length;
            var title = currentWorkflow === 'research' ? '🔍 研究藏品' : currentWorkflow === 'delete' ? '🗑️ 删除藏品' : '➕ 添加新藏品';

            var html = '<div class="wf-header">' +
                '<button class="wf-back" onclick="wfBack()">←</button>' +
                '<span class="wf-title">' + title + '</span>' +
                '<span class="wf-step-indicator">第' + currentVisible + '步 / 共' + totalVisible + '步</span>' +
                '</div><div class="wf-content">';

            if (step.type === 'photos') {
                html += '<p class="wf-label">' + step.label + '</p>';
                if (wfPhotos.length > 0 && currentWorkflow === 'add' && wfData._existingImageIds) {
                    html += '<div style="background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.3);border-radius:8px;padding:12px;margin-bottom:12px;font-size:0.9rem;color:#c9a84c;">✅ 已自动载入研究时上传的 ' + wfPhotos.length + ' 张照片 <button onclick="wfResetPhotos()" style="margin-left:8px;padding:4px 12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#e8ecf4;font-size:0.85rem;cursor:pointer;">🔄 重新选择</button></div>';
                }
                html += '<div class="wf-photo-area" onclick="wfPickPhotos()"><div class="icon">📷</div><p>' + (wfPhotos.length > 0 ? '点击添加更多照片' : '点击选择照片<br>支持多张') + '</p></div>';
                html += '<div class="wf-thumbs" id="wf-thumbs">';
                wfPhotos.forEach(function(p, i) {
                    html += '<div class="wf-thumb"><img src="' + p.dataUrl + '" onclick="openLightbox(\'' + p.dataUrl.replace(/'/g, "\\'") + '\')"><button class="remove" onclick="wfRemovePhoto(' + i + ')">×</button></div>';
                });
                html += '</div>';
                html += '<button class="wf-btn" onclick="wfNext()" ' + (wfPhotos.length === 0 ? 'disabled' : '') + '>下一步</button>';
            } else if (step.type === 'text') {
                html += '<p class="wf-label">' + step.label + '</p>';
                html += '<input class="wf-input" id="wf-field" placeholder="' + (step.placeholder || '') + '" value="' + (wfData[step.id] || '') + '">';
                html += '<button class="wf-btn" onclick="wfNextField(\'' + step.id + '\')">下一步</button>';
            } else if (step.type === 'textarea') {
                html += '<p class="wf-label">' + step.label + '</p>';
                html += '<textarea class="wf-input" id="wf-field" placeholder="' + (step.placeholder || '') + '">' + (wfData[step.id] || '') + '</textarea>';
                html += '<button class="wf-btn" onclick="wfNextField(\'' + step.id + '\')">下一步</button>';
            } else if (step.type === 'select') {
                html += '<p class="wf-label">' + step.label + '</p>';
                html += '<select class="wf-input" id="wf-field">';
                step.options.forEach(function(o) {
                    html += '<option' + (wfData[step.id] === o ? ' selected' : '') + '>' + o + '</option>';
                });
                html += '</select>';
                html += '<button class="wf-btn" onclick="wfNextField(\'' + step.id + '\')">下一步</button>';
            } else if (step.type === 'preview') {
                html += renderPreview();
                html += '<button class="wf-btn" onclick="wfNext()">确认，下一步</button>';
                html += '<button class="wf-btn secondary" onclick="wfBack()" style="margin-top:8px;">返回修改</button>';
            } else if (step.type === 'submit') {
                html += '<p class="wf-label" style="text-align:center;font-size:1.1rem;">' + step.label + '？</p>';
                if (currentWorkflow === 'research') {
                    html += renderResearchSummary();
                } else if (currentWorkflow === 'delete') {
                    html += '<div class="preview-card" style="border-color:rgba(229,115,115,0.4);"><h4 style="color:#e57373;">⚠️ 即将删除</h4>';
                    if (wfData.name) html += '<div class="field"><label>藏品名称：</label><div class="val">' + esc(wfData.name) + '</div></div>';
                    if (wfData.reason) html += '<div class="field"><label>删除原因：</label><div class="val">' + esc(wfData.reason) + '</div></div>';
                    html += '<p style="color:#e57373;font-size:0.85rem;margin-top:12px;">此操作将从讀畫樓网站移除该藏品页面</p></div>';
                } else {
                    html += renderPreview();
                }
                html += '<button class="wf-btn" id="wf-submit-btn" onclick="wfSubmit()">✓ 确认提交</button>';
            }

            html += '</div>';
            panel.innerHTML = html;

            // Auto-focus text inputs
            var field = document.getElementById('wf-field');
            if (field && (step.type === 'text' || step.type === 'textarea')) field.focus();
            // Enter key for text inputs
            if (field && step.type === 'text') {
                field.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { e.preventDefault(); window.wfNextField(step.id); }
                });
            }
        }

        function renderResearchSummary() {
            var html = '<div class="preview-card"><h4>研究请求摘要</h4>';
            html += '<div class="preview-images">';
            wfPhotos.forEach(function(p) { html += '<img src="' + p.dataUrl + '" onclick="openLightbox(this.src)">'; });
            html += '</div>';
            if (wfData.description) html += '<div class="field"><label>描述：</label><div class="val">' + esc(wfData.description) + '</div></div>';
            html += '</div>';
            return html;
        }

        function renderPreview() {
            var html = '<div class="preview-card"><h4>藏品预览</h4>';
            html += '<div class="preview-images">';
            wfPhotos.forEach(function(p) { html += '<img src="' + p.dataUrl + '" onclick="openLightbox(this.src)">'; });
            html += '</div>';
            if (wfData.name) html += '<div class="field"><label>名称：</label><div class="val">' + esc(wfData.name) + '</div></div>';
            if (wfData.dynasty) html += '<div class="field"><label>朝代：</label><div class="val">' + esc(wfData.dynasty) + '</div></div>';
            if (wfData.description) html += '<div class="field"><label>描述：</label><div class="val">' + esc(wfData.description) + '</div></div>';
            if (wfData.dimensions) html += '<div class="field"><label>尺寸：</label><div class="val">' + esc(wfData.dimensions) + '</div></div>';
            html += '</div>';
            return html;

        function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        window.wfPickPhotos = function() {
            pickPhotos(function(files) {
                var promises = files.map(function(f) { return resizeImage(f, 1024, 0.8); });
                Promise.all(promises).then(function(results) {
                    wfPhotos = wfPhotos.concat(results);
                    renderStep();
                });
            });
        };

        window.wfRemovePhoto = function(i) {
            wfPhotos.splice(i, 1);
            if (wfPhotos.length === 0) delete wfData._existingImageIds;
            renderStep();
        };

        window.wfResetPhotos = function() {
            wfPhotos = [];
            delete wfData._existingImageIds;
            renderStep();
        };

        window.wfNext = function() {
            wfStep++;
            renderStep();
        };

        window.wfNextField = function(id) {
            var el = document.getElementById('wf-field');
            var val = el ? el.value.trim() : '';
            if (!val) { el.style.borderColor = '#e57373'; return; }
            wfData[id] = val;
            wfStep++;
            renderStep();
        };

        window.wfBack = function() {
            if (wfStep > 0) { wfStep--; renderStep(); }
            else { showMenu(); }
        };

        window.wfSubmit = function() {
            var btn = document.getElementById('wf-submit-btn');
            if (btn) { btn.disabled = true; btn.textContent = '提交中...'; }

            // Reuse existing imageIds if available (from research → add flow), else upload
            var uploadPromise;
            if (currentWorkflow === 'add' && wfData._existingImageIds && wfData._existingImageIds.length > 0 && wfPhotos.every(function(p) { return !p.blob; })) {
                // Photos already uploaded during research — reuse imageIds
                uploadPromise = Promise.resolve(wfData._existingImageIds);
            } else {
                uploadPromise = uploadPhotos(wfPhotos);
            }
            uploadPromise.then(function(imageIds) {
                // Save research photos for reuse in add_piece workflow
                if (currentWorkflow === 'research') {
                    lastResearchImageIds = imageIds.slice();
                    lastResearchDescription = wfData.description || '';
                    // Also save photo dataUrls for display
                    try { localStorage.setItem('lastResearchPhotos', JSON.stringify(wfPhotos.map(function(p) { return p.dataUrl; }))); } catch(e) {}
                    try { localStorage.setItem('lastResearchImageIds', JSON.stringify(imageIds)); } catch(e) {}
                    try { localStorage.setItem('lastResearchDescription', lastResearchDescription); } catch(e) {}
                }
                var actionMap = { research: 'research', add: 'add_piece', delete: 'delete_piece' };
                var payload = {
                    type: 'action',
                    action: actionMap[currentWorkflow] || currentWorkflow,
                    data: Object.assign({}, wfData, { imageIds: imageIds })
                };
                return fetch(API_BASE + '/chat', {
                    method: 'POST',
                    headers: apiHeaders(),
                    body: JSON.stringify(payload)
                });
            }).then(function(r) { return r.json(); }).then(function(data) {
                if (data.ok) {
                    // Switch to chat to see the response
                    showSubmittedScreen();
                } else {
                    alert('提交失败，请重试');
                    if (btn) { btn.disabled = false; btn.textContent = '✓ 确认提交'; }
                }
            }).catch(function() {
                alert('网络错误，请重试');
                if (btn) { btn.disabled = false; btn.textContent = '✓ 确认提交'; }
            });
        };

        function uploadPhotos(photos) {
            if (!photos.length) return Promise.resolve([]);
            var promises = photos.map(function(p) {
                return fetch(API_BASE + '/chat/image', {
                    method: 'POST',
                    headers: apiHeaders(),
                    body: JSON.stringify({ image: p.dataUrl })
                }).then(function(r) { return r.json(); }).then(function(d) { return d.imageId; });
            });
            return Promise.all(promises);
        }

        function showSubmittedScreen() {
            var panel = document.getElementById('workflow-panel');
            var msg = currentWorkflow === 'research' ? '✓ 研究请求已提交！' : currentWorkflow === 'delete' ? '✓ 删除请求已提交！' : '✓ 藏品信息已提交！';
            panel.innerHTML = '<div class="wf-loading"><div class="spinner"></div><p>' + msg + '</p>' +
                '<p style="margin-top:16px;font-size:0.85rem;color:#667799;">正在跳转到对话...</p></div>';
            setTimeout(function() { goToChatAfterSubmit(); }, 2000);
        }

        window.goToChatAfterSubmit = function() {
            startFreeChat();
        };

        // ========== CHAT (free chat mode) ==========
        function apiHeaders() {
            return { 'Content-Type': 'application/json', 'X-Chat-Auth': PASSWORD };
        }

        function formatTime(ts) {
            var d = new Date(ts);
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }

        function addMessage(role, text, ts, imageIds) {
            var container = document.getElementById('chat-messages');
            var typing = document.getElementById('typing');
            var div = document.createElement('div');
            div.className = 'msg ' + role;

            // Show images if present
            if (imageIds && imageIds.length) {
                var imgDiv = document.createElement('div');
                imgDiv.className = 'msg-images';
                imageIds.forEach(function(id) {
                    var img = document.createElement('img');
                    img.src = API_BASE + '/chat/image/' + id;
                    img.onclick = function() { openLightbox(this.src); };
                    imgDiv.appendChild(img);
                });
                div.appendChild(imgDiv);
            }

            if (text) {
                // Parse inline buttons: {{BUTTON:label:action_type:action_data}}
                var buttonRegex = /\{\{BUTTON:(.+?):(.+?):(.+?)\}\}/g;
                var cleanText = text.replace(buttonRegex, '');
                if (cleanText.trim()) {
                    var textSpan = document.createElement('span');
                    // Split text into parts: regular text and LINK markers
                    var parts = cleanText.trim().split(/(\{\{LINK:[^}]+\}\})/g);
                    var html = '';
                    parts.forEach(function(part) {
                        var lm = part.match(/^\{\{LINK:(.+?):(https?:\/\/.+)\}\}$/);
                        if (lm) {
                            html += '<a href="' + lm[2] + '" target="_blank" style="display:inline-block;margin:8px 0;padding:10px 20px;background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.4);border-radius:20px;color:#e8e4dd;text-decoration:none;font-size:0.92rem;">\ud83d\udcc4 ' + lm[1] + '</a>';
                        } else {
                            // Escape HTML then auto-link URLs
                            var safe = part.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                            safe = safe.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" style="color:#7ab6ff;word-break:break-all;">$1</a>');
                            html += safe;
                        }
                    });
                    textSpan.innerHTML = html;
                    div.appendChild(textSpan);
                }
                var match;
                buttonRegex.lastIndex = 0;
                while ((match = buttonRegex.exec(text)) !== null) {
                    var btnEl = document.createElement('button');
                    btnEl.className = 'msg-btn';
                    btnEl.textContent = match[1];
                    btnEl.setAttribute('data-action', match[2]);
                    btnEl.setAttribute('data-data', match[3]);
                    (function(btn, actionType, actionData) {
                        btn.onclick = function() {
                            btn.disabled = true;
                            btn.textContent = '已提交，正在生成报告...';
                            fetch(API_BASE + '/chat', {
                                method: 'POST',
                                headers: apiHeaders(),
                                body: JSON.stringify({ type: 'action', action: actionType, data: { originalMessageId: actionData } })
                            }).then(function(r) { return r.json(); }).then(function(d) {
                                if (d.ok) {
                                    waitingForReply = true;
                                    showTyping(true);
                                }
                            }).catch(function() { btn.textContent = '提交失败，请重试'; btn.disabled = false; });
                        };
                    })(btnEl, match[2], match[3]);
                    div.appendChild(btnEl);
                }
            }
            if (ts) {
                var timeSpan = document.createElement('span');
                timeSpan.className = 'time';
                timeSpan.textContent = formatTime(ts);
                div.appendChild(timeSpan);
            }
            container.insertBefore(div, typing);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping(show) {
            var el = document.getElementById('typing');
            el.style.display = show ? 'block' : 'none';
            if (show) {
                var container = document.getElementById('chat-messages');
                container.scrollTop = container.scrollHeight;
            }
        }

        function loadMessages() {
            fetch(API_BASE + '/chat?since=0', { headers: apiHeaders() })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    // Clear existing messages except typing indicator
                    var container = document.getElementById('chat-messages');
                    var typing = document.getElementById('typing');
                    while (container.firstChild !== typing && container.firstChild) {
                        container.removeChild(container.firstChild);
                    }

                    if (data.messages && data.messages.length) {
                        data.messages.forEach(function(m) {
                            var display = m.text || '';
                            if (m.type === 'action') {
                                display = m.action === 'research' ? '🔍 [研究藏品请求]' : '➕ [添加藏品请求]';
                                if (m.data && m.data.description) display += '\n' + m.data.description;
                            }
                            addMessage(m.role === 'user' ? 'user' : 'bot', display, m.ts, m.imageIds);
                            if (m.ts > lastTs) lastTs = m.ts;
                        });
                        var last = data.messages[data.messages.length - 1];
                        if (last.role === 'user' && last.processed === false) {
                            waitingForReply = true;
                            showTyping(true);
                        }
                    } else {
                        addMessage('bot', '欢迎来到讀畫樓！🏛️\n\n我是讀畫樓助手，有什么可以帮您的吗？\n\n点击左下角 ☰ 菜单可以选择：\n🔍 研究藏品\n➕ 添加新藏品\n💬 自由对话', Date.now());
                    }
                })
                .catch(function() {
                    addMessage('bot', '连接服务器失败，请稍后刷新页面重试。', Date.now());
                });
        }

        function pollMessages() {
            if (currentMode !== 'chat') return;
            fetch(API_BASE + '/chat?since=' + lastTs, { headers: apiHeaders() })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.messages && data.messages.length) {
                        data.messages.forEach(function(m) {
                            var display = m.text || '';
                            if (m.type === 'action') {
                                display = m.action === 'research' ? '🔍 [研究藏品请求]' : '➕ [添加藏品请求]';
                            }
                            addMessage(m.role === 'user' ? 'user' : 'bot', display, m.ts, m.imageIds);
                            if (m.ts > lastTs) lastTs = m.ts;
                            if (m.role === 'bot') { waitingForReply = false; showTyping(false); }
                        });
                    }
                })
                .catch(function() {});
        }

        // ========== FREE CHAT PHOTO ATTACH ==========
        var chatPhotos = []; // {dataUrl, blob} for free chat mode

        window.chatPickPhoto = function() {
            pickPhotos(function(files) {
                var promises = files.map(function(f) { return resizeImage(f, 1024, 0.8); });
                Promise.all(promises).then(function(results) {
                    chatPhotos = chatPhotos.concat(results);
                    renderChatPhotoPreview();
                });
            });
        };

        window.chatRemovePhoto = function(i) {
            chatPhotos.splice(i, 1);
            renderChatPhotoPreview();
        };

        function renderChatPhotoPreview() {
            var preview = document.getElementById('chat-photo-preview');
            var thumbs = document.getElementById('chat-photo-thumbs');
            if (chatPhotos.length === 0) {
                preview.style.display = 'none';
                return;
            }
            preview.style.display = 'block';
            var html = '';
            chatPhotos.forEach(function(p, i) {
                html += '<div style="position:relative;width:50px;height:50px;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,0.15);">' +
                    '<img src="' + p.dataUrl + '" style="width:100%;height:100%;object-fit:cover;">' +
                    '<button onclick="chatRemovePhoto(' + i + ')" style="position:absolute;top:1px;right:1px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:0.7rem;cursor:pointer;">×</button>' +
                    '</div>';
            });
            html += '<span style="color:#8899bb;font-size:0.8rem;">' + chatPhotos.length + '张照片</span>';
            thumbs.innerHTML = html;
        }

        window.sendMessage = function() {
            var input = document.getElementById('chat-input');
            var text = input.value.trim();
            if (!text && chatPhotos.length === 0) return;

            var btn = document.getElementById('chat-send');
            btn.disabled = true;
            input.value = '';

            // If photos attached, upload first then send as research request
            var sendPromise;
            if (chatPhotos.length > 0) {
                sendPromise = uploadPhotos(chatPhotos).then(function(imageIds) {
                    chatPhotos = [];
                    renderChatPhotoPreview();
                    return fetch(API_BASE + '/chat', {
                        method: 'POST',
                        headers: apiHeaders(),
                        body: JSON.stringify({
                            type: 'action',
                            action: 'research',
                            data: { description: text || '请分析这些照片', imageIds: imageIds }
                        })
                    });
                });
            } else {
                sendPromise = fetch(API_BASE + '/chat', {
                    method: 'POST',
                    headers: apiHeaders(),
                    body: JSON.stringify({ text: text })
                });
            }

            sendPromise
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.ok) {
                    addMessage('user', text, data.message.ts);
                    lastTs = data.message.ts;
                    waitingForReply = true;
                    showTyping(true);
                } else if (data.error === 'rate_limited') {
                    addMessage('bot', '⚠️ 发送太频繁了，请稍等一会儿再试。', Date.now());
                } else {
                    addMessage('bot', '⚠️ 发送失败，请重试。', Date.now());
                }
                btn.disabled = false;
                input.focus();
            })
            .catch(function() {
                addMessage('bot', '⚠️ 网络错误，请检查网络后重试。', Date.now());
                btn.disabled = false;
            });
        };

        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                window.sendMessage();
            }
        });
        // ========== TASK LIST (工作日志) — API-backed, per-user ==========
        var taskFilter = 'all'; // 'all', 'active', 'done'
        var cachedTasks = []; // local cache, synced with server

        function taskEsc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function formatDate(ts) {
            var d = new Date(ts);
            var m = (d.getMonth()+1).toString().padStart(2,'0');
            var day = d.getDate().toString().padStart(2,'0');
            return m + '-' + day;
        }

        window.openTaskList = function() {
            setMode('tasks');
            // Show loading, then fetch from server
            var panel = document.getElementById('task-panel');
            panel.innerHTML = '<div class="wf-loading"><div class="spinner"></div><p>加载中...</p></div>';
            fetch(API_BASE + '/chat/tasks', { headers: apiHeaders(), credentials: 'same-origin' })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    cachedTasks = data.tasks || [];
                    renderTaskPanel();
                })
                .catch(function() {
                    // Fallback to localStorage if API unavailable
                    try { cachedTasks = JSON.parse(localStorage.getItem('readgallery_tasks')) || []; } catch(e) { cachedTasks = []; }
                    renderTaskPanel();
                });
        };

        function renderTaskPanel() {
            var panel = document.getElementById('task-panel');
            var tasks = cachedTasks;
            var active = tasks.filter(function(t) { return !t.done; });
            var done = tasks.filter(function(t) { return t.done; });
            var todayStr = new Date().toISOString().slice(0,10);
            var doneToday = done.filter(function(t) { return t.doneAt && t.doneAt.slice(0,10) === todayStr; });

            var html = '';
            // Header
            html += '<div class="task-header">';
            html += '<button class="wf-back" onclick="showMenu()">←</button>';
            html += '<span class="wf-title">📋 工作日志</span>';
            html += '</div>';

            // Stats
            html += '<div class="task-stats">';
            html += '<div class="task-stat"><div class="stat-num">' + active.length + '</div><div class="stat-label">待办</div></div>';
            html += '<div class="task-stat gold"><div class="stat-num">' + doneToday.length + '</div><div class="stat-label">今日完成</div></div>';
            html += '<div class="task-stat"><div class="stat-num">' + done.length + '</div><div class="stat-label">总完成</div></div>';
            html += '</div>';

            // Add area
            html += '<div class="task-add-area">';
            html += '<input class="task-add-input" id="task-input" placeholder="添加新任务..." maxlength="200">';
            html += '<button class="task-add-btn" onclick="addTask()">添加</button>';
            html += '</div>';

            // Filter tabs
            html += '<div class="task-filter-tabs">';
            html += '<button class="task-filter-tab' + (taskFilter==='all'?' active':'') + '" onclick="setTaskFilter(\'all\')">全部 (' + tasks.length + ')</button>';
            html += '<button class="task-filter-tab' + (taskFilter==='active'?' active':'') + '" onclick="setTaskFilter(\'active\')">待办 (' + active.length + ')</button>';
            html += '<button class="task-filter-tab' + (taskFilter==='done'?' active':'') + '" onclick="setTaskFilter(\'done\')">已完成 (' + done.length + ')</button>';
            html += '</div>';

            // Task list
            var filtered = tasks;
            if (taskFilter === 'active') filtered = active;
            else if (taskFilter === 'done') filtered = done;

            html += '<div class="task-list">';
            if (filtered.length === 0) {
                var emptyMsg = taskFilter === 'done' ? '还没有完成的任务' : taskFilter === 'active' ? '所有任务都完成了 🎉' : '还没有任务，添加一个吧';
                var emptyIcon = taskFilter === 'active' ? '✨' : '📝';
                html += '<div class="task-empty"><div class="empty-icon">' + emptyIcon + '</div>' + emptyMsg + '</div>';
            } else {
                var activeFiltered = filtered.filter(function(t) { return !t.done; });
                var doneFiltered = filtered.filter(function(t) { return t.done; });

                if (taskFilter === 'all' && activeFiltered.length > 0 && doneFiltered.length > 0) {
                    activeFiltered.forEach(function(t) { html += renderTaskItem(t); });
                    html += '<div class="task-section-label">— 已完成 —</div>';
                    doneFiltered.forEach(function(t) { html += renderTaskItem(t); });
                } else {
                    filtered.forEach(function(t) { html += renderTaskItem(t); });
                }
            }
            html += '</div>';

            panel.innerHTML = html;

            var inp = document.getElementById('task-input');
            if (inp) {
                inp.focus();
                inp.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { e.preventDefault(); addTask(); }
                });
            }
        }

        function renderTaskItem(t) {
            var html = '<div class="task-item' + (t.done ? ' done' : '') + '" id="task-' + t.id + '">';
            html += '<button class="task-checkbox' + (t.done ? ' checked' : '') + '" onclick="toggleTask(\'' + t.id + '\')">' + (t.done ? '✓' : '') + '</button>';
            html += '<div class="task-content">';
            html += '<div class="task-text">' + taskEsc(t.text) + '</div>';
            html += '<div class="task-meta">';
            html += '创建: ' + formatDate(t.createdAt);
            if (t.done && t.doneAt) html += ' · 完成: ' + formatDate(t.doneAt);
            html += '</div></div>';
            html += '<button class="task-delete" onclick="deleteTask(\'' + t.id + '\')" title="删除">✕</button>';
            html += '</div>';
            return html;
        }

        window.addTask = function() {
            var inp = document.getElementById('task-input');
            var text = inp ? inp.value.trim() : '';
            if (!text) { if (inp) inp.style.borderColor = '#e57373'; return; }
            inp.value = '';
            inp.disabled = true;

            fetch(API_BASE + '/chat/tasks', {
                method: 'POST',
                headers: apiHeaders(),
                credentials: 'same-origin',
                body: JSON.stringify({ text: text })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.ok && data.task) {
                    cachedTasks.unshift(data.task);
                }
                renderTaskPanel();
            })
            .catch(function() {
                // Fallback: add locally
                cachedTasks.unshift({ id: Date.now().toString(), text: text, done: false, createdAt: new Date().toISOString(), doneAt: null });
                renderTaskPanel();
            });
        };

        window.toggleTask = function(id) {
            var task = cachedTasks.find(function(t) { return t.id === id; });
            if (!task) return;
            var newDone = !task.done;

            // Optimistic update
            task.done = newDone;
            task.doneAt = newDone ? new Date().toISOString() : null;

            var el = document.getElementById('task-' + id);
            if (el && newDone) {
                el.classList.add('just-done');
                setTimeout(function() { renderTaskPanel(); }, 400);
            } else {
                renderTaskPanel();
            }

            // Sync to server
            fetch(API_BASE + '/chat/tasks/' + id, {
                method: 'PUT',
                headers: apiHeaders(),
                credentials: 'same-origin',
                body: JSON.stringify({ done: newDone })
            }).catch(function() { /* silent — optimistic update already applied */ });
        };

        window.deleteTask = function(id) {
            var task = cachedTasks.find(function(t) { return t.id === id; });
            if (!task) return;
            if (!confirm('删除这个任务？\n\n' + task.text)) return;

            cachedTasks = cachedTasks.filter(function(t) { return t.id !== id; });
            renderTaskPanel();

            fetch(API_BASE + '/chat/tasks/' + id, {
                method: 'DELETE',
                headers: apiHeaders(),
                credentials: 'same-origin'
            }).catch(function() { /* silent */ });
        };

        window.setTaskFilter = function(f) {
            taskFilter = f;
            renderTaskPanel();
        };

        // Cloudflare Access gates the site — no password needed
        enterChat();
    })();
    </script>
</body>
</html>

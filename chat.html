<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>讀畫樓助手</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Noto Serif SC', serif;
            background: linear-gradient(135deg, #1a2a4a 0%, #0f1d3e 50%, #14294d 100%);
            color: #e8ecf4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        /* Password screen */
        #password-screen {
            text-align: center;
            animation: fadeUp 0.6s ease;
        }
        #password-screen h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #7ab6ff, #4a90e2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #password-screen p {
            color: #8899bb;
            margin-bottom: 28px;
            font-size: 0.95rem;
        }
        .password-input {
            padding: 12px 20px;
            font-size: 1rem;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            color: #e8ecf4;
            font-family: inherit;
            width: 260px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }
        .password-input:focus { border-color: #4a90e2; }
        .password-input::placeholder { color: #667799; }
        .password-btn {
            display: block;
            margin: 16px auto 0;
            padding: 10px 32px;
            background: linear-gradient(to right, #3953b3, #5a80d8);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
        }
        .password-btn:hover { background: linear-gradient(to right, #4a63c3, #6a90e8); }
        .password-error {
            color: #e57373;
            font-size: 0.85rem;
            margin-top: 12px;
            min-height: 20px;
        }

        /* Chat screen */
        #chat-screen {
            display: none;
            width: 100%;
            max-width: 640px;
            height: 85vh;
            flex-direction: column;
            background: rgba(15, 28, 52, 0.6);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            animation: fadeUp 0.5s ease;
        }
        .chat-header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-header h2 {
            font-size: 1.3rem;
            letter-spacing: 3px;
            font-weight: 500;
        }
        .chat-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #8899bb;
        }
        .chat-status .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #4caf50;
        }
        .chat-header a {
            color: #8899bb;
            font-size: 0.85rem;
            text-decoration: none;
        }
        .chat-header a:hover { color: #b0c4f0; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .msg {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 0.98rem;
            line-height: 1.8;
            animation: msgIn 0.3s ease;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg.bot {
            align-self: flex-start;
            background: rgba(74, 144, 226, 0.15);
            border: 1px solid rgba(74, 144, 226, 0.2);
            border-bottom-left-radius: 4px;
        }
        .msg.user {
            align-self: flex-end;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-right-radius: 4px;
        }
        .msg .time {
            display: block;
            font-size: 0.72rem;
            color: #667799;
            margin-top: 6px;
        }

        /* Typing indicator */
        .typing-indicator {
            align-self: flex-start;
            padding: 12px 18px;
            border-radius: 12px;
            background: rgba(74, 144, 226, 0.1);
            border: 1px solid rgba(74, 144, 226, 0.15);
            border-bottom-left-radius: 4px;
            display: none;
        }
        .typing-indicator span {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #4a90e2;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out;
            opacity: 0.4;
        }
        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 1rem;
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: #e8ecf4;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-input:focus { border-color: #4a90e2; }
        .chat-input::placeholder { color: #556688; }
        .chat-send {
            padding: 12px 20px;
            background: linear-gradient(to right, #3953b3, #5a80d8);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .chat-send:hover { background: linear-gradient(to right, #4a63c3, #6a90e8); }
        .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

        .notice {
            text-align: center;
            font-size: 0.78rem;
            color: #556688;
            padding: 4px;
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 640px) {
            body { padding: 10px; }
            #chat-screen { height: 92vh; border-radius: 12px; }
            .msg { max-width: 88%; }
            .chat-header { padding: 14px 16px; }
            .chat-messages { padding: 16px; }
            .chat-input-area { padding: 12px; }
        }
    </style>
</head>
<body>
    <!-- Password Screen -->
    <div id="password-screen">
        <h1>讀畫樓</h1>
        <p>请输入访问密码</p>
        <input type="password" id="pw-input" class="password-input" placeholder="密码" autofocus>
        <button class="password-btn" onclick="checkPassword()">进入</button>
        <div class="password-error" id="pw-error"></div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen">
        <div class="chat-header">
            <div>
                <h2>讀畫樓助手</h2>
                <div class="chat-status"><span class="dot"></span> 在线</div>
            </div>
            <a href="index.html">← 返回首页</a>
        </div>
        <div class="chat-messages" id="chat-messages">
            <!-- Messages loaded from server -->
            <div class="typing-indicator" id="typing">
                <span></span><span></span><span></span>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" class="chat-input" placeholder="输入消息..." disabled>
            <button class="chat-send" id="chat-send" onclick="sendMessage()" disabled>发送</button>
        </div>
        <div class="notice">回复可能需要1-2分钟，请耐心等待 🙏</div>
    </div>

    <script>
    (function() {
        var PASSWORD = 'readgallery2026';
        var API_BASE = 'https://chat-worker.chengmu2010.workers.dev/api';
        var pollTimer = null;
        var lastTs = 0;
        var waitingForReply = false;

        // Check if already authenticated this session
        if (sessionStorage.getItem('chat_auth') === PASSWORD) {
            enterChat();
        }

        window.checkPassword = function() {
            var input = document.getElementById('pw-input');
            if (input.value === PASSWORD) {
                sessionStorage.setItem('chat_auth', PASSWORD);
                enterChat();
            } else {
                document.getElementById('pw-error').textContent = '密码错误，请重试';
                input.value = '';
                input.focus();
            }
        };

        document.getElementById('pw-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') window.checkPassword();
        });

        function enterChat() {
            document.getElementById('password-screen').style.display = 'none';
            var chat = document.getElementById('chat-screen');
            chat.style.display = 'flex';
            document.getElementById('chat-input').disabled = false;
            document.getElementById('chat-send').disabled = false;
            document.getElementById('chat-input').focus();

            // Load history then start polling
            loadMessages();
            pollTimer = setInterval(pollMessages, 3000);
        }

        function apiHeaders() {
            return {
                'Content-Type': 'application/json',
                'X-Chat-Auth': PASSWORD
            };
        }

        function formatTime(ts) {
            var d = new Date(ts);
            var h = d.getHours().toString().padStart(2, '0');
            var m = d.getMinutes().toString().padStart(2, '0');
            return h + ':' + m;
        }

        function addMessage(role, text, ts) {
            var container = document.getElementById('chat-messages');
            var typing = document.getElementById('typing');
            var div = document.createElement('div');
            div.className = 'msg ' + role;
            div.textContent = text;
            if (ts) {
                var timeSpan = document.createElement('span');
                timeSpan.className = 'time';
                timeSpan.textContent = formatTime(ts);
                div.appendChild(timeSpan);
            }
            container.insertBefore(div, typing);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping(show) {
            var el = document.getElementById('typing');
            el.style.display = show ? 'block' : 'none';
            if (show) {
                var container = document.getElementById('chat-messages');
                container.scrollTop = container.scrollHeight;
            }
        }

        function loadMessages() {
            fetch(API_BASE + '/chat?since=0', { headers: apiHeaders() })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.messages && data.messages.length) {
                        data.messages.forEach(function(m) {
                            addMessage(m.role === 'user' ? 'user' : 'bot', m.text, m.ts);
                            if (m.ts > lastTs) lastTs = m.ts;
                        });
                        // Check if last user msg is unprocessed
                        var last = data.messages[data.messages.length - 1];
                        if (last.role === 'user' && last.processed === false) {
                            waitingForReply = true;
                            showTyping(true);
                        }
                    } else {
                        // Welcome message if empty
                        addMessage('bot', '欢迎来到讀畫樓！🏛️\n\n我是讀畫樓助手，有什么可以帮您的吗？', Date.now());
                    }
                })
                .catch(function(err) {
                    addMessage('bot', '连接服务器失败，请稍后刷新页面重试。', Date.now());
                });
        }

        function pollMessages() {
            fetch(API_BASE + '/chat?since=' + lastTs, { headers: apiHeaders() })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.messages && data.messages.length) {
                        data.messages.forEach(function(m) {
                            addMessage(m.role === 'user' ? 'user' : 'bot', m.text, m.ts);
                            if (m.ts > lastTs) lastTs = m.ts;
                            if (m.role === 'bot') {
                                waitingForReply = false;
                                showTyping(false);
                            }
                        });
                    }
                })
                .catch(function() { /* silent retry */ });
        }

        window.sendMessage = function() {
            var input = document.getElementById('chat-input');
            var text = input.value.trim();
            if (!text) return;

            var btn = document.getElementById('chat-send');
            btn.disabled = true;
            input.value = '';

            fetch(API_BASE + '/chat', {
                method: 'POST',
                headers: apiHeaders(),
                body: JSON.stringify({ text: text })
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.ok) {
                    addMessage('user', text, data.message.ts);
                    lastTs = data.message.ts;
                    waitingForReply = true;
                    showTyping(true);
                } else if (data.error === 'rate_limited') {
                    addMessage('bot', '⚠️ 发送太频繁了，请稍等一会儿再试。', Date.now());
                } else {
                    addMessage('bot', '⚠️ 发送失败，请重试。', Date.now());
                }
                btn.disabled = false;
                input.focus();
            })
            .catch(function() {
                addMessage('bot', '⚠️ 网络错误，请检查网络后重试。', Date.now());
                btn.disabled = false;
            });
        };

        document.getElementById('chat-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                window.sendMessage();
            }
        });
    })();
    </script>
</body>
</html>
